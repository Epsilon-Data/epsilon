log_format cookie_debug '$remote_addr [$time_local] "$request" $status - cookies: "$http_cookie"';

server {
  listen 80;
  listen [::]:80;
  root /usr/share/nginx/html;
  index index.html index.htm;

  access_log /dev/stdout cookie_debug;

  # No cookie path rewrite — token-handler manages cookie paths

  location /api/v1/token {
    proxy_pass http://token-handler-api:8081/api/v1/token;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin $http_origin;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }

  location /api/v1/hub {
    proxy_pass http://epsilon-api:3334/api/v1/hub;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }

  location /realms {
    proxy_pass http://keycloak:8080/realms;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /robots.txt {
    add_header Content-Type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
  }
}
